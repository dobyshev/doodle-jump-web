<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Page</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <h1>Telegram Mini App Test</h1>
    <p id="status">Loading...</p>

    <script>
      document.getElementById("status").innerHTML = "Page loaded";

      if (window.Telegram?.WebApp) {
        document.getElementById("status").innerHTML =
          "✅ Telegram WebApp detected!";
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.MainButton.setText("Test").show();
      } else {
        document.getElementById("status").innerHTML = "❌ Not in Telegram";
      }
    </script>
  </body>
</html>
